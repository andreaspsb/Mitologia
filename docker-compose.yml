services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mitologia
      POSTGRES_USER: mitologia
      POSTGRES_PASSWORD: mitologia
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mitologia -d mitologia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
